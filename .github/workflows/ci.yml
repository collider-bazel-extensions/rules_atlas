name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analysis_and_cli:
    name: bazel test (ubuntu-latest, CLI tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-cli
          repository-cache: true

      # rules_pg's launcher uses `--socket-fd=N` for PostgreSQL major
      # versions 14–17. That's a Debian-only patch (from
      # postgresql-common) — stock upstream postgres rejects it as
      # `unrecognized configuration parameter "socket_fd"`. The
      # ubuntu-runner default postgres is 16 and lacks the patch.
      # Install PG 18 from PGDG so `actual_pg_version` falls OUTSIDE
      # rules_pg's 14–17 range and the launcher takes its non-
      # socket-fd fallback path. Also: PG binaries live in
      # /usr/lib/postgresql/<ver>/bin/, NOT /usr/bin (only thin
      # wrappers for psql + pg_isready) — add the bin dir to PATH so
      # rules_pg's `pg.system()` sees pg_ctl at repo-rule time.
      - name: Install PostgreSQL 18 (PGDG) and put bin on PATH
        run: |
          set -euo pipefail
          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
              | sudo tee /etc/apt/keyrings/pgdg.asc > /dev/null
          codename=$(lsb_release -cs)
          echo "deb [signed-by=/etc/apt/keyrings/pgdg.asc] https://apt.postgresql.org/pub/repos/apt $codename-pgdg main" \
              | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-18
          pg_bin=/usr/lib/postgresql/18/bin
          [[ -d "$pg_bin" ]] || { echo "$pg_bin not present" >&2; exit 1; }
          echo "$pg_bin" >> "$GITHUB_PATH"
          echo "added to PATH: $pg_bin"
          "$pg_bin/pg_ctl" --version

      # `bazel build //...` analyzes ALL platforms' atlas binary repos,
      # including darwin which can't be downloaded on a linux runner
      # without the right sha. Target specific paths instead — same
      # lesson rules_temporal v0.3 / rules_spicedb learned.
      - name: bazel build (smoke targets)
        run: |
          bazel build \
            //tests/install_smoke:smoke_test \
            //tests/migrate_diff_smoke:migrate_diff_smoke_test \
            //tests/migrate_lint_pg_smoke:lint_pg_smoke_test

      - name: bazel test (CLI primitives)
        run: bazel test //tests:all --test_output=errors

      # rules_pg's pg_server uses host postgres binaries (initdb,
      # pg_ctl, psql, pg_isready). Verify post-PATH-mod that all four
      # are reachable before launching the smoke.
      - name: Verify postgres on PATH
        run: |
          set -euo pipefail
          for bin in initdb pg_ctl psql pg_isready; do
            command -v "$bin" >/dev/null || { echo "missing: $bin" >&2; exit 1; }
          done
          initdb --version

      - name: bazel test (migrate-diff smoke + lint-pg smoke)
        run: |
          bazel test \
            //tests/migrate_diff_smoke:migrate_diff_smoke_test \
            //tests/migrate_lint_pg_smoke:lint_pg_smoke_test \
            --test_output=errors

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs-cli
          path: bazel-testlogs/
          if-no-files-found: ignore

  install_smoke:
    # Full E2E install smoke: kind + CNPG operator + CNPG Cluster
    # (single Postgres) + Atlas Operator + AtlasSchema CR + kubectl
    # exec psql verify.
    name: install smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-install-smoke
          repository-cache: true

      - name: Verify Docker is available
        run: docker version

      - name: bazel test //tests/install_smoke:smoke_test
        # kind boot (~30s) + CNPG install (~60s) + CNPG Cluster
        # bootstrap (image pull + initdb, ~2 min) + Atlas Operator
        # install (~30s) + AtlasSchema reconciliation (~30s) + verify.
        run: bazel test //tests/install_smoke:smoke_test --test_output=streamed --test_timeout=1500

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs-install-smoke
          path: bazel-testlogs/
          if-no-files-found: ignore
