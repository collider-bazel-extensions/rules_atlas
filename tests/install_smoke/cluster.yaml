---
# Pre-AtlasSchema fixture: namespace, secrets, CNPG Cluster, dev-DB.
# All resources here must be Ready before the AtlasSchema CR is
# applied (separate file: atlasschema.yaml). The Atlas Operator stalls
# permanently after a single connect-refused on the target or dev-DB
# (it sets condition Stalled=True after one retry), so we apply the
# AtlasSchema only once both databases are accepting connections.

apiVersion: v1
kind: Namespace
metadata:
  name: atlas-smoke
---
apiVersion: v1
kind: Secret
metadata:
  name: smoke-pg-app
  namespace: atlas-smoke
type: kubernetes.io/basic-auth
stringData:
  username: app
  password: smoke-fixture-atlas-cnpg
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: smoke-pg
  namespace: atlas-smoke
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6
  storage:
    size: 512Mi
    storageClass: standard
  postgresql:
    parameters:
      shared_buffers: "64MB"
      max_connections: "100"
  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: smoke-pg-app
---
# Atlas needs both a target URL (the Cluster above) and a dev URL (a
# scratch postgres for diff planning). The operator auto-provisions a
# dev-DB if `spec.devURL` is unset, but that Deployment has no
# readiness probe — the operator attempts to connect as soon as the
# pod is `Running`, postgres typically hasn't accepted listens yet,
# and the connect-refused error sets `Stalled=True` after a single
# retry. A hand-rolled dev-DB with `pg_isready` as the readiness probe
# (the smoke waits on the Deployment Available condition before
# applying the AtlasSchema CR) sidesteps this entirely.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-devdb
  namespace: atlas-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlas-devdb
  template:
    metadata:
      labels:
        app: atlas-devdb
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_PASSWORD
          value: devdb
        - name: POSTGRES_DB
          value: devdb
        - name: PGDATA
          value: /tmp/pgdata
        ports:
        - containerPort: 5432
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - devdb
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 3
          failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-devdb
  namespace: atlas-smoke
spec:
  selector:
    app: atlas-devdb
  ports:
  - port: 5432
    targetPort: 5432
---
# CNPG's auto-generated `<cluster>-app` Secret carries password +
# username + host/port/dbname but NOT a pre-assembled URL — author
# one here pointing at the cluster's `-rw` Service.
apiVersion: v1
kind: Secret
metadata:
  name: smoke-pg-atlas-url
  namespace: atlas-smoke
type: Opaque
stringData:
  url: "postgres://app:smoke-fixture-atlas-cnpg@smoke-pg-rw.atlas-smoke.svc.cluster.local:5432/app?sslmode=disable&search_path=public"
